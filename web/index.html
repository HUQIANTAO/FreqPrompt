<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FreqPrompt — TFL Prompt Optimizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..600&family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
  <link rel="stylesheet" href="styles.css">
<body>
  <div id="wasm-loading" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--surface);border:1px solid var(--hairline-strong);border-radius:var(--radius-lg);padding:16px 24px;z-index:9999;font-size:13px;color:var(--text-muted);box-shadow:var(--shadow-sm);">加载 WASM 引擎…</div>
  <!-- ═══ TOP NAV ═══ -->
  <nav class="topnav">
    <div class="topnav-left">
      <a class="logo" href="/">
        <span class="logo-mark">FP</span>
        <span class="logo-text">Freq<span class="accent">Prompt</span></span>
      </a>
    </div>
    <div class="topnav-right">
      <span class="config-chip" id="config-indicator" title="API 设置">
        <span class="dot warn" id="config-dot"></span>
        <span id="config-label">未配置</span>
      </span>
      <button class="icon-btn" id="btn-history" title="历史记录">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      </button>
      <button class="icon-btn" id="btn-theme" title="切换主题">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="icon-sun"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="icon-moon" style="display:none;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </nav>

  <!-- ═══ WORKSPACE ═══ -->
  <div class="workspace">
    <section class="pane-left">
      <div class="pane-left-header">输入</div>
      <div class="pane-left-body">
        <textarea class="prompt-area" id="prompt-input"
          placeholder="输入 Prompt 开始优化…&#10;&#10;中文：请用通俗的语言解释什么是量子计算&#10;English：Explain quantum computing to a 5-year-old"
          autocomplete="off" spellcheck="false"></textarea>
        <div class="textarea-footer">
          <span id="char-count">0 字符</span>
          <span style="font-size:10.5px;color:var(--text-soft);">⌘↵ 优化  ·  ⌘K 清空</span>
        </div>
        <div id="live-score" class="live-score" style="display:none;">
          <div class="live-score-row">
            <span class="live-score-label">实时</span>
            <span class="live-score-value" id="live-score-value">—</span>
            <div class="live-score-bar"><div class="live-score-bar-fill" id="live-score-bar-fill"></div></div>
          </div>
          <div class="live-score-meta" id="live-score-label"></div>
        </div>
        <div class="examples-row">
          <button class="example-chip">请阐述财政政策调整对宏观经济均衡状态的影响机制</button>
          <button class="example-chip">Explain quantum computing to a 5-year-old</button>
          <button class="example-chip">请用通俗易懂的语言解释什么是量子计算</button>
          <button class="example-chip">Write a polite email declining a meeting request</button>
        </div>
        <div class="action-row">
          <button class="btn" id="optimize-btn">优化提示词</button>
          <span id="optimize-spinner" style="display:none;align-items:center;gap:7px;font-size:12.5px;color:var(--text-body);">
            <span class="spinner"></span><span id="round-progress">优化中…</span>
          </span>
        </div>
        <div id="error-msg" class="error-msg" style="display:none;"></div>
        <!-- ═══ V3 SETTINGS BUTTON ═══ -->
        <div class="v3-settings-row">
          <button class="btn-ghost" id="btn-v3-settings" title="打分权重设置">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            <span>打分权重</span>
          </button>
        </div>
      </div>
    </section>

    <section class="pane-right" id="results-pane">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 12h2"/><path d="M6 7v10"/><path d="M10 4v16"/><path d="M14 8v8"/><path d="M18 5v14"/><path d="M22 12h-2"/>
          </svg>
        </div>
        <div class="empty-title">开始优化你的 Prompt</div>
        <div class="empty-desc">
          基于 Adam's Law (arXiv:2604.02176v2)，系统用 LLM 生成高频改写版本，由 Zipf 频率引擎评分排序。分数越高，LLM 越容易准确理解。
        </div>
        <div class="empty-features">
          <span class="empty-feature">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            频率打分
          </span>
          <span class="empty-feature">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
            可视化对比
          </span>
          <span class="empty-feature">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            历史记录
          </span>
        </div>
      </div>
      <div class="results-inner" id="results-content" style="display:none;"></div>
      <div id="slot-guard-report" class="slot-guard-host"></div>
      <div id="ontology-report" class="ontology-host"></div>
      <div id="multi-layer-report" class="multi-layer-host"></div>
    </section>
  </div>

  <!-- ═══ HISTORY DRAWER ═══ -->
  <div class="drawer-overlay" id="history-overlay"></div>
  <div class="drawer" id="history-drawer">
    <div class="drawer-header">
      <span class="drawer-title">历史记录</span>
      <div style="display:flex;gap:2px;">
        <button class="icon-btn" id="btn-clear-history" title="清空全部" style="width:30px;height:30px;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        </button>
        <button class="icon-btn" id="btn-close-history" style="width:30px;height:30px;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>
    <div class="drawer-toolbar">
      <button class="btn btn-ghost btn-xs" id="btn-export-history">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        导出 JSON
      </button>
      <button class="btn btn-ghost btn-xs" id="btn-import-history">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        导入 JSON
      </button>
      <input type="file" id="import-file-input" accept=".json" style="display:none;">
    </div>
    <div class="drawer-body" id="history-list">
      <div class="history-empty">还没有优化记录</div>
    </div>
  </div>

  <!-- ═══ SETTINGS MODAL ═══ -->
  <div class="modal-overlay" id="settings-overlay">
    <div class="modal">
      <h2>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        API 配置
      </h2>
      <div class="form-row">
        <div class="form-group">
          <label for="base-url">Base URL</label>
          <input type="text" id="base-url" placeholder="https://api.openai.com/v1" autocomplete="off">
        </div>
        <div class="form-group">
          <label for="model-id">Model ID</label>
          <input type="text" id="model-id" placeholder="gpt-4o-mini" autocomplete="off">
        </div>
      </div>
      <div class="form-group">
        <label for="api-key">API Key</label>
        <input type="password" id="api-key" placeholder="sk-..." autocomplete="off">
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost btn-sm" id="btn-cancel-settings">取消</button>
        <button class="btn btn-sm" id="save-config">保存</button>
      </div>
    </div>
  </div>

  <!-- ═══ V3 WEIGHT SETTINGS MODAL ═══ -->
  <div class="modal-overlay" id="weight-modal-overlay">
    <div class="modal-card">
      <div class="modal-header">
        <span class="modal-title">打分权重设置</span>
        <button class="modal-close" id="btn-close-weight-modal">&times;</button>
      </div>
      <div class="modal-body">
        <div id="weight-config"></div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script type="module" src="./main.js"></script>
</body>
</html>
