<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FreqPrompt — TFL Prompt Optimizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..600&family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    /* ══════════════════════════════════════════════
       DESIGN TOKENS — FreqPrompt v2
       ══════════════════════════════════════════════ */
    :root {
      --brand: #f54e00;
      --brand-hover: #d04200;
      --brand-soft: rgba(245,78,0,0.08);
      --bg: #f7f7f4;
      --bg-soft: #fafaf7;
      --surface: #ffffff;
      --surface-hover: #f9f9f6;
      --hairline: #e6e5e0;
      --hairline-strong: #cfcdc4;
      --text: #26251e;
      --text-body: #5a5852;
      --text-muted: #807d72;
      --text-soft: #a09c92;
      --success: #1f8a65;
      --success-soft: rgba(31,138,101,0.08);
      --error: #cf2d56;
      --error-soft: rgba(207,45,86,0.06);
      --warning: #c08532;
      --nav-h: 52px;
      --radius-sm: 6px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-pill: 9999px;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.06);
      --transition: 0.18s cubic-bezier(0.4,0,0.2,1);
    }

    /* Dark mode */
    :root.dark {
      --brand-soft: rgba(245,78,0,0.12);
      --bg: #1a1a16;
      --bg-soft: #1f1f1a;
      --surface: #252520;
      --surface-hover: #2a2a24;
      --hairline: #33332e;
      --hairline-strong: #44443d;
      --text: #e8e6df;
      --text-body: #b5b2a9;
      --text-muted: #8a877e;
      --text-soft: #6b6860;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.3);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    /* ══════════════════════════════════════════════
       BASE
       ══════════════════════════════════════════════ */
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      font-weight: 400;
      line-height: 1.5;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      transition: background var(--transition), color var(--transition);
    }

    /* ══════════════════════════════════════════════
       TOP NAVIGATION
       ══════════════════════════════════════════════ */
    .topnav {
      height: var(--nav-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      border-bottom: 1px solid var(--hairline);
      background: var(--surface);
      flex-shrink: 0;
      gap: 16px;
      z-index: 10;
    }
    .topnav-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 9px;
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.3px;
      text-decoration: none;
    }
    .logo-mark {
      width: 30px; height: 30px;
      background: var(--brand);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .logo-text { white-space: nowrap; }
    .logo-text .accent { color: var(--brand); }

    .topnav-right {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* Icon buttons */
    .icon-btn {
      width: 36px; height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      cursor: pointer;
      font-size: 16px;
      transition: all var(--transition);
      position: relative;
    }
    .icon-btn:hover { background: var(--brand-soft); color: var(--text); }
    .icon-btn:active { transform: scale(0.95); }
    .icon-btn .badge-dot {
      position: absolute;
      top: 4px; right: 4px;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--brand);
      border: 2px solid var(--surface);
    }

    /* Config indicator in nav */
    .config-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border-radius: var(--radius-pill);
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      border: 1px solid transparent;
      transition: all var(--transition);
      white-space: nowrap;
    }
    .config-chip:hover { border-color: var(--hairline-strong); background: var(--bg-soft); }
    .config-chip .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .config-chip .dot.ok { background: var(--success); }
    .config-chip .dot.warn { background: var(--error); }

    /* ══════════════════════════════════════════════
       WORKSPACE
       ══════════════════════════════════════════════ */
    .workspace {
      flex: 1;
      display: flex;
      overflow: hidden;
      min-height: 0;
    }

    /* ── Left pane ── */
    .pane-left {
      width: 400px;
      min-width: 340px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--hairline);
      background: var(--surface);
      transition: background var(--transition), border-color var(--transition);
    }
    .pane-left-header {
      padding: 16px 20px 10px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.88px;
      text-transform: uppercase;
      color: var(--text-muted);
      flex-shrink: 0;
    }
    .pane-left-body {
      flex: 1;
      padding: 0 20px 16px;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    /* Textarea */
    .prompt-area {
      flex: 1;
      width: 100%;
      padding: 14px 16px;
      background: var(--bg-soft);
      border: 1px solid var(--hairline);
      border-radius: var(--radius-md);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.65;
      resize: none;
      outline: none;
      transition: all var(--transition);
      min-height: 140px;
    }
    .prompt-area:focus {
      border-color: var(--brand);
      background: var(--surface);
      box-shadow: 0 0 0 3px var(--brand-soft);
    }
    .prompt-area::placeholder { color: var(--text-soft); }

    /* Char count */
    .textarea-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 6px;
      font-size: 11px;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    /* Example chips */
    .examples-row {
      display: flex;
      gap: 6px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .example-chip {
      padding: 5px 12px;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      background: var(--bg-soft);
      border: 1px solid var(--hairline);
      border-radius: var(--radius-pill);
      cursor: pointer;
      transition: all var(--transition);
      white-space: nowrap;
      font-family: inherit;
    }
    .example-chip:hover {
      background: var(--brand-soft);
      border-color: var(--brand);
      color: var(--brand);
    }

    /* Action row */
    .action-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 14px;
      flex-shrink: 0;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 0 20px;
      height: 38px;
      background: var(--brand);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
      white-space: nowrap;
      letter-spacing: -0.1px;
    }
    .btn:hover { background: var(--brand-hover); }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    .btn-ghost {
      background: transparent;
      color: var(--text-body);
      border: 1px solid var(--hairline-strong);
      font-weight: 500;
    }
    .btn-ghost:hover { background: var(--bg-soft); color: var(--text); }

    .btn-sm {
      height: 30px;
      padding: 0 12px;
      font-size: 12px;
      font-weight: 500;
      border-radius: var(--radius-sm);
    }
    .btn-xs {
      height: 26px;
      padding: 0 10px;
      font-size: 11px;
      font-weight: 500;
      border-radius: var(--radius-sm);
    }

    .kbd-hint {
      font-size: 11px;
      color: var(--text-soft);
      white-space: nowrap;
      margin-left: 4px;
    }
    .kbd-hint kbd {
      display: inline-block;
      padding: 1px 5px;
      font-family: inherit;
      font-size: 10px;
      font-weight: 500;
      background: var(--bg-soft);
      border: 1px solid var(--hairline);
      border-radius: 3px;
      vertical-align: 1px;
      color: var(--text-muted);
    }

    /* Loading skeleton */
    .loading-shimmer {
      background: linear-gradient(90deg, var(--bg-soft) 25%, var(--hairline) 50%, var(--bg-soft) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: var(--radius-sm);
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(245,78,0,0.12);
      border-top-color: var(--brand);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error */
    .error-msg {
      margin-top: 10px;
      padding: 10px 14px;
      border-radius: var(--radius-md);
      font-size: 13px;
      line-height: 1.5;
      background: var(--error-soft);
      border: 1px solid rgba(207,45,86,0.2);
      color: var(--error);
    }

    /* ══════════════════════════════════════════════
       RIGHT PANE — Results
       ══════════════════════════════════════════════ */
    .pane-right {
      flex: 1;
      overflow-y: auto;
      background: var(--bg);
      min-width: 0;
      transition: background var(--transition);
    }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      padding: 60px 40px;
    }
    .empty-icon {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: var(--brand-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      color: var(--brand);
    }
    .empty-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }
    .empty-desc {
      font-size: 13px;
      color: var(--text-muted);
      max-width: 320px;
      line-height: 1.6;
      margin-bottom: 20px;
    }
    .empty-features {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .empty-feature {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: var(--radius-pill);
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      background: var(--surface);
      border: 1px solid var(--hairline);
    }

    /* Results content */
    .results-inner {
      padding: 24px 32px;
      max-width: 780px;
    }

    /* ── Score hero ── */
    .score-hero {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 20px 24px;
      background: var(--surface);
      border: 1px solid var(--hairline);
      border-radius: var(--radius-lg);
      margin-bottom: 20px;
      transition: background var(--transition), border-color var(--transition);
    }
    .score-ring-wrap {
      flex-shrink: 0;
      width: 72px; height: 72px;
    }
    .score-info { flex: 1; min-width: 0; }
    .score-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.88px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 2px;
    }
    .score-value {
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 36px;
      font-weight: 600;
      line-height: 1.1;
      color: var(--text);
      letter-spacing: -1px;
    }
    .score-delta {
      font-size: 13px;
      font-weight: 600;
      margin-top: 2px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .delta-pos { color: var(--success); }
    .delta-neg { color: var(--error); }
    .delta-neu { color: var(--text-muted); }
    .score-bar-wrap {
      margin-top: 8px;
      height: 6px;
      background: var(--hairline);
      border-radius: 3px;
      overflow: hidden;
      display: flex;
    }
    .score-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
    }
    .score-bar-fill.opt { background: var(--brand); }
    .score-bar-fill.orig { background: var(--text-soft); }

    /* ── Prompt card ── */
    .prompt-card {
      background: var(--surface);
      border: 1px solid var(--hairline);
      border-radius: var(--radius-lg);
      margin-bottom: 12px;
      overflow: hidden;
      transition: all var(--transition);
    }
    .prompt-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 16px;
      background: var(--bg-soft);
      border-bottom: 1px solid var(--hairline);
      gap: 8px;
    }
    .prompt-card-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.88px;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .prompt-card-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: var(--radius-pill);
      letter-spacing: 0.6px;
      text-transform: uppercase;
    }
    .badge-best { background: var(--success-soft); color: var(--success); }
    .badge-orig { background: var(--hairline); color: var(--text-muted); }
    .prompt-card-body {
      padding: 18px 16px 16px;
      font-size: 14px;
      line-height: 1.7;
      color: var(--text);
      word-break: break-word;
      white-space: pre-wrap;
    }
    .prompt-card-body.is-original {
      color: var(--text-muted);
      font-size: 13px;
    }
    .prompt-card-actions {
      display: flex;
      gap: 6px;
      padding: 0 16px 14px;
    }

    /* ── Score comparison bars ── */
    .score-compare {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }
    .score-compare-item {
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--hairline);
      border-radius: var(--radius-md);
    }
    .score-compare-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.88px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .score-compare-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 22px;
      font-weight: 600;
    }
    .score-compare-bar {
      height: 5px;
      border-radius: 3px;
      margin-top: 8px;
      transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
    }

    /* ── Candidates ── */
    .candidates-section { margin-top: 24px; }
    .candidates-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .candidates-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.88px;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .candidates-count {
      font-size: 11px;
      color: var(--text-soft);
    }

    .candidate-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--hairline);
      border-radius: var(--radius-md);
      margin-bottom: 5px;
      transition: all var(--transition);
    }
    .candidate-row:hover { border-color: var(--hairline-strong); }
    .candidate-row.is-best {
      border-color: rgba(31,138,101,0.25);
      background: var(--success-soft);
    }
    .candidate-row.is-original { background: var(--bg-soft); }
    .candidate-rank {
      flex-shrink: 0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      padding-top: 2px;
      min-width: 20px;
    }
    .candidate-text {
      flex: 1;
      font-size: 13px;
      line-height: 1.55;
      color: var(--text-body);
      word-break: break-word;
      min-width: 0;
      white-space: pre-wrap;
    }
    .candidate-score {
      flex-shrink: 0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: var(--radius-pill);
    }
    .score-high { background: var(--success-soft); color: var(--success); }
    .score-mid  { background: rgba(192,133,50,0.1); color: var(--warning); }
    .score-low  { background: var(--error-soft); color: var(--error); }

    .candidate-row .tag-inline {
      font-size: 9px;
      font-weight: 700;
      padding: 1px 7px;
      border-radius: var(--radius-pill);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-left: 6px;
      vertical-align: 1px;
    }
    .tag-inline.best { background: var(--success-soft); color: var(--success); }
    .tag-inline.orig { background: var(--hairline); color: var(--text-muted); }

    /* ── History drawer ── */
    .drawer-overlay {
      position: fixed; inset: 0; z-index: 50;
      background: rgba(0,0,0,0.2);
      pointer-events: none; opacity: 0;
      transition: opacity 0.2s;
    }
    .drawer-overlay.open { pointer-events: auto; opacity: 1; }
    .drawer {
      position: fixed; top: 0; right: 0;
      width: 420px; max-width: 90vw; height: 100vh;
      background: var(--surface);
      border-left: 1px solid var(--hairline);
      z-index: 51;
      transform: translateX(100%);
      transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
      display: flex;
      flex-direction: column;
    }
    .drawer.open { transform: translateX(0); }
    .drawer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--hairline);
      flex-shrink: 0;
    }
    .drawer-title {
      font-size: 15px;
      font-weight: 600;
    }
    .drawer-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px 20px;
    }
    .history-item {
      padding: 14px;
      border: 1px solid var(--hairline);
      border-radius: var(--radius-md);
      margin-bottom: 8px;
      cursor: pointer;
      transition: all var(--transition);
    }
    .history-item:hover { border-color: var(--hairline-strong); background: var(--bg-soft); }
    .history-item-time {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .history-item-prompt {
      font-size: 13px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .history-item-score {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 600;
      color: var(--success);
      margin-top: 4px;
    }
    .history-empty {
      text-align: center;
      color: var(--text-muted);
      padding: 40px 0;
      font-size: 13px;
    }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 100;
      display: flex; align-items: flex-start; justify-content: center;
      padding-top: 100px;
      background: rgba(0,0,0,0.25);
      pointer-events: none; opacity: 0;
      transition: opacity 0.2s;
    }
    .modal-overlay.open { pointer-events: auto; opacity: 1; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--hairline);
      border-radius: var(--radius-lg);
      width: 480px; max-width: 90vw;
      padding: 28px;
      box-shadow: var(--shadow-md);
    }
    .modal h2 {
      font-size: 17px; font-weight: 600; margin-bottom: 20px;
      display: flex; align-items: center; gap: 10px;
    }
    .form-group { margin-bottom: 14px; }
    .form-group label {
      display: block;
      font-size: 12px; font-weight: 600; color: var(--text-body);
      margin-bottom: 5px;
      letter-spacing: 0.2px;
    }
    .form-group input, .form-group select {
      width: 100%; height: 40px;
      padding: 0 12px;
      background: var(--bg-soft);
      border: 1px solid var(--hairline-strong);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      outline: none;
      transition: all var(--transition);
    }
    .form-group input:focus, .form-group select:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px var(--brand-soft);
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .modal-actions {
      display: flex; gap: 8px; justify-content: flex-end;
      margin-top: 20px; padding-top: 16px;
      border-top: 1px solid var(--hairline);
    }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(10px);
      background: var(--text); color: var(--bg);
      padding: 10px 22px; border-radius: var(--radius-pill);
      font-size: 13px; font-weight: 500;
      z-index: 200;
      pointer-events: none; opacity: 0;
      transition: all 0.2s;
      box-shadow: var(--shadow-md);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Footer ── */
    .footer-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 20px;
      border-top: 1px solid var(--hairline);
      background: var(--surface);
      font-size: 11px;
      color: var(--text-muted);
      flex-shrink: 0;
      gap: 16px;
      transition: background var(--transition), border-color var(--transition);
    }
    .footer-bar a { color: var(--brand); text-decoration: none; }
    .footer-bar a:hover { text-decoration: underline; }

    /* ══════════════════════════════════════════════
       RESPONSIVE
       ══════════════════════════════════════════════ */
    @media (max-width: 768px) {
      .workspace { flex-direction: column; }
      .pane-left {
        width: 100%; min-width: 0; max-height: 50vh;
        border-right: none; border-bottom: 1px solid var(--hairline);
      }
      .pane-right { flex: 1; }
      .results-inner { padding: 20px 16px; }
      .score-hero { flex-direction: column; align-items: flex-start; }
      .score-compare { grid-template-columns: 1fr; }
      .logo-text { display: none; }
      .pane-left-header { padding: 12px 16px 8px; }
      .pane-left-body { padding: 0 16px 12px; }
      .prompt-area { min-height: 100px; }
      .drawer { width: 100%; max-width: 100%; }
    }
  </style>
</head>
<body>
  <!-- ═══ TOP NAVIGATION ═══ -->
  <nav class="topnav">
    <div class="topnav-left">
      <a class="logo" href="/">
        <span class="logo-mark">FP</span>
        <span class="logo-text">Freq<span class="accent">Prompt</span></span>
      </a>
    </div>
    <div class="topnav-right">
      <span class="config-chip" id="config-indicator" title="API 设置">
        <span class="dot warn" id="config-dot"></span>
        <span id="config-label">未配置</span>
      </span>
      <button class="icon-btn" id="btn-history" title="历史记录">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      </button>
      <button class="icon-btn" id="btn-theme" title="切换主题">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="icon-sun"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="icon-moon" style="display:none;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </nav>

  <!-- ═══ WORKSPACE ═══ -->
  <div class="workspace">
    <!-- Left: Input -->
    <section class="pane-left">
      <div class="pane-left-header">输入</div>
      <div class="pane-left-body">
        <textarea class="prompt-area" id="prompt-input"
          placeholder="输入你想优化的 Prompt…&#10;&#10;高频表达能让 LLM 给出更准确、更高质量的回答"
          autocomplete="off" spellcheck="false"></textarea>
        <div class="textarea-footer">
          <span id="char-count">0 字符</span>
          <span style="font-size:11px;color:var(--text-soft);">⌘↵ 优化</span>
        </div>
        <div class="examples-row">
          <button class="example-chip">Explain quantum computing to a 5-year-old</button>
          <button class="example-chip">Write a polite email declining a meeting</button>
          <button class="example-chip">Debug this Python function step by step</button>
        </div>
        <div class="action-row">
          <button class="btn" id="optimize-btn">优化提示词</button>
          <span id="optimize-spinner" style="display:none;align-items:center;gap:8px;font-size:13px;color:var(--text-body);">
            <span class="spinner"></span>正在优化…
          </span>
        </div>
        <div id="error-msg" class="error-msg" style="display:none;"></div>
      </div>
    </section>

    <!-- Right: Results -->
    <section class="pane-right" id="results-pane">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 12h2"/>
            <path d="M6 7v10"/>
            <path d="M10 4v16"/>
            <path d="M14 8v8"/>
            <path d="M18 5v14"/>
            <path d="M22 12h-2"/>
          </svg>
        </div>
        <div class="empty-title">开始优化你的 Prompt</div>
        <div class="empty-desc">
          基于 Textual Frequency Law，系统会调用 LLM 生成多个高频改写版本，
          再用 Zipf 频率引擎打分排序。分数越高，LLM 理解和回答质量越好。
        </div>
        <div class="empty-features">
          <span class="empty-feature">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            频率打分
          </span>
          <span class="empty-feature">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
            可视化对比
          </span>
          <span class="empty-feature">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            历史记录
          </span>
          <span class="empty-feature">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            一键导出
          </span>
        </div>
      </div>
      <div class="results-inner" id="results-content" style="display:none;"></div>
    </section>
  </div>

  <!-- ═══ FOOTER ═══ -->
  <div class="footer-bar">
    <span>基于 <a href="https://arxiv.org/abs/2604.02176v2" target="_blank">Adam's Law: Textual Frequency Law on LLMs</a></span>
    <span>·</span>
    <span>arXiv:2604.02176v2</span>
  </div>

  <!-- ═══ HISTORY DRAWER ═══ -->
  <div class="drawer-overlay" id="history-overlay"></div>
  <div class="drawer" id="history-drawer">
    <div class="drawer-header">
      <span class="drawer-title">历史记录</span>
      <button class="icon-btn" id="btn-close-history">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="drawer-body" id="history-list">
      <div class="history-empty">还没有优化记录</div>
    </div>
  </div>

  <!-- ═══ SETTINGS MODAL ═══ -->
  <div class="modal-overlay" id="settings-overlay">
    <div class="modal">
      <h2>API 配置</h2>
      <div class="form-row">
        <div class="form-group">
          <label for="base-url">Base URL</label>
          <input type="text" id="base-url" placeholder="https://api.openai.com/v1" autocomplete="off">
        </div>
        <div class="form-group">
          <label for="model-id">Model ID</label>
          <input type="text" id="model-id" placeholder="gpt-4o-mini" autocomplete="off">
        </div>
      </div>
      <div class="form-group">
        <label for="api-key">API Key</label>
        <input type="password" id="api-key" placeholder="sk-..." autocomplete="off">
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost btn-sm" id="btn-cancel-settings">取消</button>
        <button class="btn btn-sm" id="save-config">保存配置</button>
      </div>
    </div>
  </div>

  <!-- ═══ TOAST ═══ -->
  <div class="toast" id="toast"></div>

  <script type="module" src="./bundle.js"></script>
</body>
</html>
